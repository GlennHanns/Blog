<style>
:root {
--bg: #0a0a0a;
--surface: #111111;
--border: #1e1e1e;
--accent: #ff6600;
--text: #ffffff;
--muted: #888888;
--max-width: 1200px;
--nav-h: 68px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
background: var(--bg);
color: var(--text);
font-family: 'DM Sans', sans-serif;
font-size: 1rem;
line-height: 1.75;
-webkit-font-smoothing: antialiased;
}
body::before {
content: '';
display: block;
position: fixed;
top: 0; left: 0; right: 0;
height: 3px;
background: var(--accent);
z-index: 1001;
}
img { max-width: 100%; height: auto; display: block; }
a { color: var(--accent); text-decoration: none; }
a:hover { opacity: 0.8; }
.page-width { max-width: var(--max-width); margin: 0 auto; padding: 0 2rem; }

/* NAV */
.site-nav {
position: fixed;
top: 3px; left: 0; right: 0;
height: var(--nav-h);
background: rgba(10,10,10,0.96);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
border-bottom: 1px solid var(--border);
z-index: 1000;
}
.nav-inner {
position: relative;
display: flex;
align-items: center;
justify-content: space-between;
height: 100%;
max-width: var(--max-width);
margin: 0 auto;
padding: 0 2rem;
}
.nav-logo img { height: 46px; width: auto; }
.nav-links {
display: flex;
gap: 2.5rem;
list-style: none;
}
.nav-links a {
font-size: 0.7rem;
font-weight: 500;
letter-spacing: 0.22em;
text-transform: uppercase;
color: #666;
transition: color 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: #fff; opacity: 1; }
.nav-toggle {
display: none;
flex-direction: column;
gap: 5px;
background: none;
border: none;
cursor: pointer;
padding: 0.5rem;
}
.nav-centre-logo {
position: absolute;
left: 50%;
transform: translateX(-50%);
display: flex;
align-items: center;
}
.nav-centre-logo img { height: 38px; width: auto; }
.nav-toggle span {
display: block;
width: 22px; height: 2px;
background: var(--text);
transition: transform 0.3s, opacity 0.3s;
border-radius: 1px;
}

/* CONTENT */
.site-content { padding-top: calc(var(--nav-h) + 3px); }

/* WORK PAGE */
.work-section { padding: 3rem 0 5rem; }
.work-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 1.5rem;
padding: 0 2rem;
max-width: var(--max-width);
margin-left: auto;
margin-right: auto;
}
.work-label {
font-size: 0.55rem;
letter-spacing: 0.28em;
text-transform: uppercase;
color: #444;
}
.work-nav { display: flex; align-items: center; gap: 0.9rem; }
.work-nav button {
background: none;
border: none;
color: #999;
cursor: pointer;
padding: 0;
display: flex;
align-items: center;
transition: color 0.2s;
}
.work-nav button:hover { color: var(--accent); }
.work-nav span {
font-size: 0.55rem;
letter-spacing: 0.1em;
color: #555;
min-width: 28px;
text-align: center;
}

/* SWIPER */
#proj-swiper {
display: flex;
gap: 1rem;
overflow-x: auto;
scroll-snap-type: x mandatory;
scroll-padding: 0 12.5%;
padding: 0 12.5%;
scrollbar-width: none;
-ms-overflow-style: none;
-webkit-overflow-scrolling: touch;
}
#proj-swiper::-webkit-scrollbar { display: none; }
.swiper-end-spacer { flex: 0 0 12.5%; }
.proj-slide {
flex: 0 0 75%;
scroll-snap-align: center;
aspect-ratio: 16/9;
border-radius: 12px;
overflow: hidden;
position: relative;
border: 1px solid var(--border);
transition: opacity 0.35s, transform 0.35s;
background: #0d0d0d;
}
.proj-slide iframe {
width: 100%; height: 100%;
display: none;
position: absolute;
inset: 0;
border: none;
}
.proj-slide .slide-cover {
width: 100%; height: 100%;
object-fit: cover;
display: block;
}
.proj-slide .slide-cover[data-poster="true"] {
cursor: pointer;
}
.proj-slide .play-overlay {
display: none;
position: absolute;
inset: 0;
align-items: center;
justify-content: center;
pointer-events: none;
}
.proj-slide .play-overlay.visible {
display: flex;
}
.play-overlay-btn {
width: 64px; height: 64px;
border-radius: 50%;
background: rgba(0,0,0,0.55);
border: 2px solid rgba(255,255,255,0.7);
display: flex; align-items: center; justify-content: center;
}
.play-overlay-btn::after {
content: '';
display: block;
width: 0; height: 0;
border-style: solid;
border-width: 10px 0 10px 20px;
border-color: transparent transparent transparent rgba(255,255,255,0.9);
margin-left: 4px;
}
.proj-slide .still-preview {
width: 100%; height: 100%;
object-fit: contain;
display: none;
position: absolute;
inset: 0;
background: #000;
cursor: zoom-out;
}

/* PROJECT INFO */
#proj-info {
max-width: var(--max-width);
margin: 1.5rem auto 0;
padding: 0 2rem;
text-align: center;
transition: opacity 0.3s ease, transform 0.3s ease;
}
.proj-cat {
font-size: 0.52rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(--accent);
margin-bottom: 0.2rem;
}
.proj-title {
font-family: 'Bebas Neue', sans-serif;
font-size: clamp(1.4rem, 3vw, 2.2rem);
letter-spacing: 0.04em;
color: var(--text);
line-height: 1.1;
margin-bottom: 0.2rem;
}
.proj-meta {
font-size: 0.62rem;
color: #444;
margin-bottom: 0.9rem;
}
.proj-desc {
font-size: 0.78rem;
color: #777;
line-height: 1.75;
max-width: 520px;
margin: 0 auto 0.4rem;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}
.proj-desc.expanded {
display: block;
overflow: visible;
}
.desc-toggle {
display: none;
background: none;
border: none;
color: var(--accent);
font-size: 0.68rem;
font-family: 'DM Sans', sans-serif;
letter-spacing: 0.08em;
cursor: pointer;
padding: 0;
margin: 0 auto 1.25rem;
}
.desc-toggle.visible { display: block; }
.proj-details {
display: flex;
gap: 3rem;
justify-content: center;
flex-wrap: wrap;
margin-bottom: 1.5rem;
}
.proj-details-col p.detail-label {
font-size: 0.52rem;
letter-spacing: 0.22em;
text-transform: uppercase;
color: #444;
margin-bottom: 0.5rem;
}
.proj-details-col p.detail-val {
font-size: 0.74rem;
color: #888;
line-height: 1.6;
margin-bottom: 0.28rem;
}

/* STILLS STRIP */
.stills-section { border-top: 1px solid #141414; padding-top: 1rem; margin-top: 1.5rem; }
#still-nav {
display: flex;
justify-content: center;
align-items: center;
gap: 2rem;
padding: 0.75rem 0 0.25rem;
}
.still-arrow {
background: none;
border: 1px solid #333;
color: #fff;
font-size: 1.2rem;
width: 40px;
height: 40px;
border-radius: 50%;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: border-color 0.2s, color 0.2s;
}
.still-arrow:hover { border-color: var(--accent); color: var(--accent); }
.stills-label {
font-size: 0.52rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: #333;
margin-bottom: 0.6rem;
}
#thumb-strip {
display: flex;
flex-direction: row;
gap: 0.65rem;
overflow-x: auto;
overflow-y: hidden;
padding-bottom: 0.5rem;
padding-left: 2rem;
padding-right: 2rem;
scrollbar-width: none;
-ms-overflow-style: none;
overscroll-behavior-x: contain;
}
#thumb-strip::-webkit-scrollbar { display: none; }
.thumb-item {
flex: 0 0 auto;
width: 380px;
height: 214px;
border-radius: 8px;
overflow: hidden;
border: 1px solid var(--border);
background: #0d0d0d;
}
.thumb-item img { width: 380px; height: 214px; object-fit: cover; display: block; }

/* FOOTER */
.site-footer {
background: var(--surface);
border-top: 1px solid var(--border);
padding: 4rem 0 2.5rem;
margin-top: 5rem;
}
.footer-grid {
display: grid;
grid-template-columns: 110px 1fr auto;
gap: 2.5rem;
align-items: start;
padding-bottom: 2.5rem;
border-bottom: 1px solid var(--border);
margin-bottom: 1.75rem;
}
.footer-photo img { width: 110px; height: auto; }
.footer-info h4 {
font-size: 0.68rem;
font-weight: 500;
letter-spacing: 0.28em;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 0.75rem;
}
.footer-info p {
font-size: 0.9rem;
color: var(--muted);
margin-bottom: 0.35rem;
line-height: 1.5;
}
.footer-info a {
color: var(--text);
font-size: 0.9rem;
border-bottom: 1px solid var(--border);
padding-bottom: 1px;
transition: color 0.2s, border-color 0.2s;
display: inline-block;
margin-bottom: 0.35rem;
}
.footer-info a:hover { color: var(--accent); border-color: var(--accent); opacity: 1; }
.footer-socials {
display: flex;
flex-direction: column;
gap: 0.9rem;
align-items: flex-end;
}
.footer-socials a {
font-size: 0.68rem;
font-weight: 500;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(--muted);
transition: color 0.2s;
}
.footer-socials a:hover { color: var(--accent); opacity: 1; }
.footer-base {
display: flex;
justify-content: space-between;
align-items: center;
}
.footer-base p {
font-size: 0.68rem;
letter-spacing: 0.12em;
text-transform: uppercase;
color: #444;
}
.footer-tagline {
font-family: 'Bebas Neue', sans-serif;
font-size: 1.4rem;
color: var(--accent);
letter-spacing: 0.04em;
margin-bottom: 2rem;
padding-bottom: 1.75rem;
border-bottom: 1px solid var(--border);
}

/* TESTIMONIAL */
.proj-testimonial {
display: none;
margin: 0 auto 1.5rem;
padding: 1.25rem 1.5rem;
border-left: 3px solid var(--accent);
text-align: left;
}
.proj-testimonial blockquote {
font-size: 0.85rem;
font-style: italic;
color: #bbb;
line-height: 1.75;
margin: 0 0 0.6rem;
}
.proj-testimonial cite {
font-size: 0.62rem;
letter-spacing: 0.18em;
text-transform: uppercase;
color: #555;
font-style: normal;
}
.proj-testimonial cite a {
color: #555;
border-bottom: 1px solid #333;
padding-bottom: 1px;
transition: color 0.2s, border-color 0.2s;
}
.proj-testimonial cite a:hover {
color: var(--accent);
border-color: var(--accent);
opacity: 1;
}

/* SEO */
.seo-h1 {
position: absolute;
width: 1px; height: 1px;
overflow: hidden;
clip: rect(0,0,0,0);
white-space: nowrap;
}

/* RESPONSIVE & MOBILE OPTIMIZATIONS */
@media (max-width: 768px) {
.nav-toggle { display: flex; }
.nav-links {
display: none;
position: absolute;
top: 100%; left: 0; right: 0;
background: var(--bg);
border-bottom: 1px solid var(--border);
flex-direction: column;
padding: 1.5rem 2rem;
gap: 1.5rem;
}
.nav-links.open { display: flex; }
.proj-slide { flex: 0 0 85%; }
#proj-swiper { scroll-padding: 0 7.5%; padding: 0 7.5%; }
.swiper-end-spacer { flex: 0 0 7.5%; }
.footer-grid { grid-template-columns: 1fr; gap: 2rem; }
.footer-socials { align-items: flex-start; flex-direction: row; gap: 1.5rem; }
.footer-base { flex-direction: column; gap: 0.5rem; text-align: center; }
.footer-tagline { font-size: 1rem; }
}

/* Mobile Landscape Overhaul: Fixes Fullscreen/Letterbox Squeeze */
@media screen and (orientation: landscape) and (max-device-height: 440px) {
  :root {
    --nav-h: 44px; /* Shaves off vertical header bulk */
  }
  .site-nav .nav-inner {
    padding: 0 1rem;
  }
  .nav-logo img {
    height: 30px; /* Scales branding down neatly */
  }
  .nav-centre-logo img {
    height: 24px;
  }
  .work-section {
    padding: 1rem 0 2rem;
  }
  .work-header {
    margin-bottom: 0.5rem;
  }
  #proj-swiper {
    scroll-padding: 0 20%;
    padding: 0 20%;
  }
  .proj-slide {
    flex: 0 0 60%; /* Adapts slides for wider horizontal viewports */
    height: calc(100vh - var(--nav-h) - 80px) !important;
    aspect-ratio: auto; /* Drops geometry locking so player expands */
  }
}

@media (prefers-reduced-motion: reduce) {
*, *::before, *::after { transition: none !important; animation: none !important; }
}
